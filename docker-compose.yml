services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      BACKUP_DIR: /data/backups
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    volumes:
      - exports:/data/exports
      - ./backups:/data/backups
      - /home/mulligan/alexa2.json:/secrets/alexa2.json:ro

volumes:
  mongo-data:
  exports:
