services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:0.5.20
    restart: unless-stopped
    # Host-side default 8599 to avoid colliding with anything else on 8000.
    # Inside the container Chroma always listens on 8000.
    ports:
      - "${CHROMA_PORT:-8599}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      args:
        WEB_BASE_PATH: ${WEB_BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      chroma:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      CHROMA_URL: http://chroma:8000
      BACKUP_DIR: /data/backups
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
      - "${HOCUSPOCUS_PORT:-3001}:${HOCUSPOCUS_PORT:-3001}"
    volumes:
      - exports:/data/exports
      - ./backups:/data/backups
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-/dev/null}:/secrets/alexa2.json:ro

volumes:
  mongo-data:
  chroma-data:
  exports:
